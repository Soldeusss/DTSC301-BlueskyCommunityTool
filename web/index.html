<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bluesky Community Tool</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
                background: #0f172a;
                color: #e2e8f0;
            }
            h1,
            h2 {
                margin: 8px 0;
            }
            .row {
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
            }
            .card {
                background: #111827;
                border: 1px solid #334155;
                border-radius: 10px;
                padding: 14px;
                flex: 1;
                min-width: 320px;
            }
            select,
            button,
            input {
                background: #1f2937;
                color: #e5e7eb;
                border: 1px solid #475569;
                border-radius: 6px;
                padding: 8px;
            }
            button {
                cursor: pointer;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
            }
            th,
            td {
                border-bottom: 1px solid #334155;
                padding: 8px;
                text-align: left;
                font-size: 13px;
                vertical-align: top;
            }
            #graph {
                height: 420px;
                border: 1px solid #334155;
                border-radius: 8px;
                background: #0b1220;
            }
            .pill {
                display: inline-block;
                padding: 2px 8px;
                border-radius: 999px;
                background: #1d4ed8;
                font-size: 12px;
                margin-right: 6px;
                margin-bottom: 6px;
            }
            .subtle {
                font-size: 11px;
                color: #94a3b8;
                margin-top: 2px;
            }
            .mono {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            }
        </style>
    </head>
    <body>
        <h1>Bluesky Community Tool</h1>
        <p>Topic recommendations, keyword cloud, and relation graph.</p>

        <div class="card">
            <label for="topicSelect">Topic:</label>
            <select id="topicSelect"></select>
            <label for="topN">Top N:</label>
            <input id="topN" type="number" min="5" max="50" value="10" />
            <button id="loadBtn">Load</button>
        </div>

        <div class="row">
            <div class="card">
                <h2>Top Recommendations</h2>
                <table id="recTable">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Feed</th>
                            <th>Score</th>
                            <th>Posts</th>
                            <th>Likes</th>
                            <th>Engagement</th>
                            <th>Why</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="row">
            <div class="card">
                <h2>Keyword "Word Cloud" (Top Terms)</h2>
                <canvas id="wordChart" height="140"></canvas>
                <div id="wordPills" style="margin-top: 10px"></div>
            </div>

            <div class="card">
                <h2>Feed Relation Graph</h2>
                <div id="graph"></div>
            </div>
        </div>

        <script>
            const topicSelect = document.getElementById("topicSelect");
            const loadBtn = document.getElementById("loadBtn");
            const topNInput = document.getElementById("topN");
            const recBody = document.querySelector("#recTable tbody");
            const wordPills = document.getElementById("wordPills");
            let wordChart = null;
            let graphNetwork = null;

            function shortDid(did) {
                if (!did) return "";
                return did.startsWith("did:plc:")
                    ? did.slice(0, 18) + "..."
                    : did;
            }

            async function fetchJSON(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
                return await res.json();
            }

            async function loadTopics() {
                const data = await fetchJSON("/topics");
                topicSelect.innerHTML = "";
                data.topics.forEach((t) => {
                    const opt = document.createElement("option");
                    opt.value = t.topic_id;
                    opt.textContent = `${t.label} (${t.topic_id})`;
                    topicSelect.appendChild(opt);
                });
            }

            function renderRecommendations(items) {
                recBody.innerHTML = "";
                items.forEach((r, idx) => {
                    const label = r.feed_label || shortDid(r.feed_id);
                    const secondary = r.handle
                        ? `@${r.handle}`
                        : shortDid(r.feed_id);

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
          <td>${idx + 1}</td>
          <td title="${r.feed_id}">
            <div>${label}</div>
            <div class="subtle mono">${secondary}</div>
          </td>
          <td>${Number(r.score).toFixed(4)}</td>
          <td>${r.post_count}</td>
          <td>${r.like_count}</td>
          <td>${r.engagement_count}</td>
          <td>${r.explanation}</td>
        `;
                    recBody.appendChild(tr);
                });
            }

            function renderWordCloud(words) {
                const labels = words.map((w) => w.text);
                const values = words.map((w) => w.value);

                if (wordChart) wordChart.destroy();
                const ctx = document
                    .getElementById("wordChart")
                    .getContext("2d");
                wordChart = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels,
                        datasets: [
                            { label: "Keyword Frequency", data: values },
                        ],
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { color: "#cbd5e1" } },
                            y: { ticks: { color: "#cbd5e1" } },
                        },
                    },
                });

                wordPills.innerHTML = "";
                words.slice(0, 30).forEach((w) => {
                    const span = document.createElement("span");
                    span.className = "pill";
                    span.textContent = `${w.text} (${w.value})`;
                    wordPills.appendChild(span);
                });
            }

            function renderGraph(nodes, edges) {
              const container = document.getElementById("graph");
            
              const dsNodes = new vis.DataSet(nodes.map(n => {
                const isTopic = n.kind === "topic";
                return {
                  id: n.id,
                  label: isTopic ? `Topic: ${n.label}` : n.label,
                  title: isTopic ? n.label : (n.raw_id || n.id),
                  shape: isTopic ? "star" : "dot",
                  size: isTopic ? 34 : 14 + Math.min(16, (n.score || 0) * 30),
                  color: isTopic
                    ? { background: "#f59e0b", border: "#fbbf24" }
                    : { background: "#2563eb", border: "#60a5fa" },
                  font: { color: "#e2e8f0", size: isTopic ? 16 : 12, face: "Inter, Arial" },
                  mass: isTopic ? 3 : 1.2
                };
              }));
            
              const dsEdges = new vis.DataSet(edges.map(e => {
                const isPrimary = e.relation === "topic_link";
                return {
                  from: e.source,
                  to: e.target,
                  width: isPrimary ? 1 + Math.min(8, (e.weight || 0) * 8) : 1 + Math.min(3, (e.weight || 0)),
                  color: isPrimary ? { color: "#38bdf8", opacity: 0.75 } : { color: "#64748b", opacity: 0.30 },
                  dashes: !isPrimary,
                  smooth: { type: "dynamic" },
                  label: "", // remove noisy labels
                };
              }));
            
              const data = { nodes: dsNodes, edges: dsEdges };
              const options = {
                autoResize: true,
                interaction: { hover: true, tooltipDelay: 120 },
                physics: {
                  stabilization: { iterations: 300 },
                  barnesHut: {
                    gravitationalConstant: -5500,
                    springLength: 190,
                    springConstant: 0.025,
                    damping: 0.22,
                    avoidOverlap: 0.9
                  }
                },
                layout: { improvedLayout: true },
                nodes: { borderWidth: 1.5 },
                edges: { selectionWidth: 2 }
              };
            
              if (graphNetwork) graphNetwork.destroy();
              graphNetwork = new vis.Network(container, data, options);
            }

            async function loadAll() {
                const topicId = topicSelect.value;
                const topN = Number(topNInput.value || 10);

                const [rec, wc, graph] = await Promise.all([
                    fetchJSON(
                        `/recommendations?topic_id=${encodeURIComponent(topicId)}&top=${topN}`,
                    ),
                    fetchJSON(
                        `/wordcloud?topic_id=${encodeURIComponent(topicId)}&top_words=30`,
                    ),
                    fetchJSON(
                        `/graph?topic_id=${encodeURIComponent(topicId)}&top_feeds=${topN}`,
                    ),
                ]);

                renderRecommendations(rec.recommendations || []);
                renderWordCloud(wc.words || []);
                renderGraph(graph.nodes || [], graph.edges || []);
            }

            loadBtn.addEventListener("click", () => {
                loadAll().catch((err) => alert(err.message));
            });

            (async function init() {
                try {
                    await loadTopics();
                    await loadAll();
                } catch (e) {
                    alert(e.message);
                }
            })();
        </script>
    </body>
</html>
